app = "originapp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  USE_PRISMA = "1"
  ORIGIN_DATA_DIR = "/data"

[[mounts]]
  source = "origin_data"
  destination = "/data"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 60

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
